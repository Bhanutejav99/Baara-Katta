<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2a1b15">
    <meta name="description" content="Play Baara Katta (Big Ashta Chamma), the royal Indian strategy board game.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Baara Katta">
    
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/dice.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/192/dice.png">

    <title>Baara Katta - Royal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --gold-primary: #f59e0b;
        --gold-light: #fcd34d;
        --gold-dark: #b45309;
        --wood-dark: #2a1b15;
        --wood-light: #5d4037;
      }

      body {
        font-family: 'Lato', sans-serif;
        background-color: #0f0a0a;
        background-image: 
          radial-gradient(circle at 50% 50%, rgba(45, 27, 21, 0.8) 0%, rgba(0, 0, 0, 1) 100%),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        color: #fff;
        min-height: 100vh;
        overflow: hidden; /* Prevent pull-to-refresh on mobile */
        overscroll-behavior-y: none; /* Disables pull-to-refresh on Android Chrome */
      }

      .font-display {
        font-family: 'Cinzel', serif;
      }

      /* 3D Coin Flip Animation */
      @keyframes flip {
        0% { transform: rotateY(0); }
        100% { transform: rotateY(360deg); }
      }
      
      /* Pulse Glow for active turn */
      @keyframes pulse-gold {
        0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
        100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
      }

      .animate-pulse-gold {
        animation: pulse-gold 2s infinite;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: #5d4037;
        border-radius: 3px;
      }

      /* Confetti for Win */
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #f00;
        animation: fall linear forwards;
      }
      @keyframes fall {
        to { transform: translateY(100vh) rotate(720deg); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
